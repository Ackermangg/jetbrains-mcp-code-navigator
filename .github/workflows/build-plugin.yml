name: Build Plugin

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-navigator-mcp-plugin
          path: build/distributions/code-navigator-mcp-plugin.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: code-navigator-mcp-plugin
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/code-navigator-mcp-plugin.zip
          generate_release_notes: true
